<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard — CadAI</title>
  <meta http-equiv="refresh" content="0; url=static/" />
  <style>
    body{background:#07070d;color:#fff;font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
    .spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.08);border-top-color:#7CFF00;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{margin-top:14px;color:rgba(255,255,255,0.35);font-size:13px;}
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
</body>
</html>
