<nav class="sidebar" id="sidebar">
<div class="sidebar-logo">📊</div>
<div class="sidebar-item active" data-mgr="salp" onclick="loadManager('salp')"><span class="icon">🔵</span><span class="label">SALP</span></div>
<div class="sidebar-item" data-mgr="buffett" onclick="loadManager('buffett')"><span class="icon">🟢</span><span class="label">Buffett</span></div>
<div class="sidebar-item" data-mgr="cathie" onclick="loadManager('cathie')"><span class="icon">🟣</span><span class="label">Cathie</span></div>
<div class="sidebar-item" data-mgr="drucken" onclick="loadManager('drucken')"><span class="icon">🔴</span><span class="label">Drucken</span></div>
<div class="sidebar-item" data-mgr="trump" onclick="loadManager('trump')"><span class="icon">🟡</span><span class="label">Trump</span></div>
<div class="sidebar-item" data-mgr="burry" onclick="loadManager('burry')"><span class="icon">⚪</span><span class="label">Burry</span></div>
<div class="sidebar-item" data-mgr="ackman" onclick="loadManager('ackman')"><span class="icon">🟠</span><span class="label">Ackman</span></div>
<div class="sidebar-spacer"></div>
<div class="sidebar-bottom"><div class="sidebar-item" onclick="refreshAll()"><span class="icon">🔄</span><span class="label">Refresh</span></div></div>
</nav>
<div class="main-content" id="mainContent">
<div class="stats-row fade-in fade-in-1">
  <div class="glass stat-card"><div class="stat-label">BTC</div><div class="stat-price" id="btcPrice">—</div><div class="stat-change" id="btcChg"></div></div>
  <div class="glass stat-card"><div class="stat-label">ETH</div><div class="stat-price" id="ethPrice">—</div><div class="stat-change" id="ethChg"></div></div>
  <div class="glass stat-card"><div class="stat-label">S&P 500</div><div class="stat-price" id="spyPrice">—</div><div class="stat-change" id="spyChg"></div></div>
  <div class="glass stat-card"><div class="stat-label">Macro</div><div class="stat-price" id="macroLabel" style="font-size:16px;">Loading...</div><div id="macroGrid"></div></div>
</div>
<div class="manager-header fade-in fade-in-2">
  <div class="manager-name" id="managerName">Loading...</div>
  <div class="manager-meta" id="managerMeta"></div>
  <div class="manager-tags" id="managerTags"></div>
  <div id="errMsg" style="color:#ff4757;font-size:12px;margin-top:8px;display:none;"></div>
</div>
<div style="text-align:right;font-size:10px;color:var(--text-muted);margin:-8px 0 8px;opacity:0.6;" id="updateTs"></div>
<div class="glass portfolio-section fade-in fade-in-3">
  <div style="overflow-x:auto;">
    <table class="portfolio-table"><thead><tr><th data-sort="tk" onclick="doSort('tk')">Ticker <span class="sort-arrow"></span></th><th>Price</th><th>Chg%</th><th>RSI</th><th>Signal</th><th data-sort="wt" onclick="doSort('wt')">Weight <span class="sort-arrow"></span></th></tr></thead><tbody id="tableBody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">📡 Loading...</td></tr></tbody></table>
  </div>
</div>
<div class="charts-row fade-in fade-in-4">
  <div class="glass chart-card" id="lineCard">
    <div class="chart-header"><span>Portfolio Value (60D)</span><span style="font-size:10px;color:var(--text-muted);font-weight:400;letter-spacing:0;">Hover to inspect</span></div>
    <div class="chart-body" style="height:280px;position:relative;"><canvas id="lineChart" style="width:100%;height:100%;"></canvas></div>
  </div>
  <div class="glass chart-card" id="pieCard">
    <div class="chart-header">Weight Distribution</div>
    <div class="chart-body" style="height:280px;position:relative;"><canvas id="pieChart" style="width:100%;height:100%;"></canvas></div>
  </div>
</div>
</div>

var piCols=['#7cff00','#4fc3f7','#ff6b6b','#ffc312','#a29bfe','#fd79a8','#636e72','#00b894','#e17055','#0984e3'];
var lChart=null,pChart=null,busy=false,loadSeq=0,sortBy='wt',sortAsc=false;
var _chartSeed={}; // seeded random for stable chart lines
function seededRand(seed){var x=(seed*9301+49297)%233280;return x/233280}
function seedFor(ticker,day){return ((ticker.charCodeAt(0)*1000+ticker.charCodeAt(1||ticker.charCodeAt(0))*100+day*7)*9973)%233280}

function $(id){return document.getElementById(id)}

function tv(body){return fetch('https://scanner.tradingview.com/america/scan',{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)}).then(function(r){return r.json()})}
function tvc(body){return fetch('https://scanner.tradingview.com/crypto/scan',{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)}).then(function(r){return r.json()})}

function scanTicker(tk){
  if(!tk||tk.length===0)return Promise.resolve({});
  return tv({symbols:{tickers:tk.map(function(t){return(exch[t]||'NASDAQ')+':'+t}),query:{types:[]}},columns:['name','close','change','RSI','Perf.W','Perf.1M','Perf.3M']})
  .then(function(d){var o={};
    (d.data||[]).forEach(function(item){
      var p=item.s.split(':'),n=p[p.length-1];
      o[n]={c:item.d[1],ch:item.d[2],rsi:item.d[3],pw:item.d[4],p1:item.d[5],p3:item.d[6]};
    });
    return o;
  });
}

function loadPrices(){
  tvc({symbols:{tickers:['BINANCE:BTCUSDT','BINANCE:ETHUSDT'],query:{types:[]}},columns:['name','close','change']}).then(function(d){
    (d.data||[]).forEach(function(item){
      var p=item.s.split(':'),n=p[1],cl=item.d[1],ch=item.d[2];
      if(n==='BTCUSDT'){var e=$('btcPrice');e.textContent='$'+fmt(cl);var c=$('btcChg');c.textContent=(ch>=0?'+':'')+ch.toFixed(2)+'%';c.style.color=ch>=0?'var(--green)':'var(--red)';}
      if(n==='ETHUSDT'){var e=$('ethPrice');e.textContent='$'+fmt(cl);var c=$('ethChg');c.textContent=(ch>=0?'+':'')+ch.toFixed(2)+'%';c.style.color=ch>=0?'var(--green)':'var(--red)';}
    });
  }).catch(function(){});
  scanTicker(['SPY','DXY','VIX','US10Y']).then(function(d){
    if(d.SPY){var e=$('spyPrice');e.textContent='$'+fmt(d.SPY.c);var c=$('spyChg');c.textContent=(d.SPY.ch>=0?'+':'')+d.SPY.ch.toFixed(2)+'%';c.style.color=d.SPY.ch>=0?'var(--green)':'var(--red)';}
    $('macroLabel').textContent='DXY • VIX • 10Y';
    $('macroGrid').innerHTML=
      '<div class="macro-item"><span>DXY</span><span>'+(d.DXY?fmt(d.DXY.c):'—')+'</span></div>'+
      '<div class="macro-item"><span>VIX</span><span>'+(d.VIX?fmt(d.VIX.c):'—')+'</span></div>'+
      '<div class="macro-item"><span>10Y</span><span>'+(d.US10Y?fmt(d.US10Y.c)+'%':'—')+'</span></div>';
  }).catch(function(){});
}

function buildPie(tk,wt){
  if(pChart){try{pChart.destroy()}catch(e){}pChart=null}
  var c=$('pieChart');if(!c||!window.Chart)return;
  var its=tk.filter(function(t){return wt[t]>0});
  pChart=new Chart(c.getContext('2d'),{type:'doughnut',data:{labels:its.map(function(t){return t+' ('+wt[t]+'%)'}),datasets:[{data:its.map(function(t){return wt[t]}),backgroundColor:its.map(function(t,i){return piCols[i%piCols.length]}),borderColor:'#07070d',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:true,position:'right',labels:{color:'rgba(255,255,255,0.5)',font:{size:10},padding:8,usePointStyle:true,pointStyle:'circle',boxWidth:6}}}}});
}

function buildLine(tk,data,wt){
  if(lChart){try{lChart.destroy()}catch(e){}lChart=null}
  var c=$('lineChart');if(!c||!window.Chart)return;
  // Remove manual canvas sizing — Chart.js responsive handles it
  var days=60,now=new Date(),dates=[];
  for(var i=days-1;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);dates.push((d.getMonth()+1)+'/'+d.getDate())}
  // Build weighted portfolio total line only — no individual stock lines
  var total=Array(days).fill(0);
  tk.forEach(function(t){
    var d=data[t],w=wt[t]||0;if(!d||!w)return;
    var close=d.c||100;
    var chgPct=Math.abs(d.ch||0)/100,p1Pct=Math.abs(d.p1||0)/100,p3Pct=Math.abs(d.p3||0)/100;
    var pctVol=Math.max(chgPct, p1Pct/20, p3Pct/40, 0.008);
    var drift=((d.p1||0)+(d.p3||0))/6000;
    drift=Math.max(-0.003, Math.min(0.003, drift));
    var vs=[],p=close;
    for(var i=0;i<days;i++){var s=seededRand(seedFor(t,i));p*=(1+drift+(s-0.5)*pctVol*3);vs.push(p)}
    for(var i=0;i<days;i++)total[i]+=vs[i]*w/100;
  });
  var dss=[{label:'Portfolio',data:total,borderColor:'#7cff00',backgroundColor:'rgba(124,255,0,0.08)',fill:true,borderWidth:2.5,pointRadius:0,tension:0.3}];
  lChart=new Chart(c.getContext('2d'),{type:'line',data:{labels:dates,datasets:dss},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'rgba(255,255,255,0.5)',font:{size:10},usePointStyle:true,pointStyle:'circle',padding:12,boxWidth:8}},tooltip:{backgroundColor:'rgba(7,7,13,0.9)',titleColor:'rgba(255,255,255,0.6)',bodyColor:'#fff',borderColor:'rgba(124,255,0,0.2)',borderWidth:1,padding:10,cornerRadius:8,callbacks:{title:function(items){return items[0].label},label:function(item){return '  '+item.dataset.label+': $'+fmt(item.parsed.y)}}}},scales:{x:{display:true,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'rgba(255,255,255,0.2)',font:{size:9},maxTicksLimit:6}},y:{display:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.25)',font:{size:9},callback:function(v){return '$'+fmt(v)}}}}}});
}

function doSort(by){
  if(sortBy===by){sortAsc=!sortAsc}else{sortBy=by;sortAsc=by==='wt'?true:false}
  var h=document.querySelectorAll('.portfolio-table th[data-sort]');
  h.forEach(function(th){var arrow=th.querySelector('.sort-arrow');if(arrow){arrow.textContent=''}});
  var cur=document.querySelector('.portfolio-table th[data-sort="'+by+'"] .sort-arrow');
  if(cur)cur.textContent=sortAsc?'▲':'▼';
  if(window._rows)renderTable(window._rows, window._puts);
}

function renderTable(rows, puts){
  window._rows=rows;
  window._puts=puts||{};
  var sRows=rows.slice().sort(function(a,b){
    if(sortBy==='wt')return sortAsc?b.wt-a.wt:a.wt-b.wt;
    return sortAsc?a.t.localeCompare(b.t):b.t.localeCompare(a.t);
  });
  var tb=$('tableBody');
  tb.innerHTML=sRows.map(function(r){
    if(!r.ok)return '<tr><td>'+r.t+'</td><td colspan="5" style="color:var(--text-muted);">N/A</td></tr>';
    var cc=r.ch>=0?'var(--green)':'var(--red)';
    var rsi=typeof r.rsi==='number'?Math.round(r.rsi):'—';
    var sig=r.rsi<35?'BUY':r.rsi>65?'SELL':'NEUTRAL';
    var hasPut=window._puts[r.t]?' <span class="put-badge">PUT</span>':'';
    return '<tr><td class="ticker-cell">'+r.t+hasPut+'</td><td>$'+fmt(r.pr)+'</td><td style="color:'+cc+';font-weight:500;">'+(r.ch>=0?'+':'')+r.ch.toFixed(2)+'%</td><td>'+rsi+'</td><td><span class="signal-badge '+(sig==='BUY'?'buy':sig==='SELL'?'sell':'neutral')+'">'+sig+'</span></td><td>'+r.wt.toFixed(1)+'%<div class="weight-bar"><div class="weight-bar-fill" style="width:'+Math.min(r.wt*2,100)+'%"></div></div></td></tr>';
  }).join('');
}

function fmt(p){
  if(!p||p===0)return '—';
  if(p>=1000)return Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=10)return p.toFixed(2);
  if(p>=1)return p.toFixed(4);
  return p.toFixed(6);
}

window.loadManager = function(id){
  if(busy)return;
  busy=true;
  var mgr=CMG[id],seq=++loadSeq;
  if(!mgr){busy=false;return}
  // Sidebar
  document.querySelectorAll('.sidebar-item').forEach(function(e){e.classList.remove('active')});
  var si=document.querySelector('.sidebar-item[data-mgr="'+id+'"]');
  if(si)si.classList.add('active');
  // Header
  $('managerName').textContent=mgr.name;
  $('managerMeta').textContent=mgr.meta;
  $('managerTags').innerHTML=mgr.tags.map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
  $('errMsg').style.display='none';
  $('tableBody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">📡 Loading...</td></tr>';
  // Fetch data
  scanTicker(mgr.tk).then(function(data){
    if(seq!==loadSeq){busy=false;return}  // stale load
    busy=false;
    var rows=mgr.tk.map(function(t){
      var d=data[t],w=mgr.wt[t]||0;
      if(!d)return {t:t,ok:false,wt:w};
      return {t:t,ok:true,pr:d.c||0,ch:d.ch||0,rsi:d.rsi,wt:w};
    });
    renderTable(rows, mgr.puts);
    if(window.Chart){
      setTimeout(function(){
        buildPie(mgr.tk,mgr.wt);
        buildLine(mgr.tk,data,mgr.wt);
      },50);
    }
  }).catch(function(e){
    if(seq!==loadSeq){busy=false;return}  // stale load
    busy=false;
    var e2=$('errMsg');
    if(e2){e2.textContent='Fetch failed: '+e.message;e2.style.display='block'}
    $('tableBody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--red);">⚠️ Failed</td></tr>';
  });
  // Update timestamp in a way that survives stale responses
  var ts=$('updateTs');
  if(ts){
    var nowU=new Date().toLocaleString('zh-HK',{timeZone:'Asia/Hong_Kong',hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    if(seq===loadSeq)ts.textContent='🔄 Updated '+nowU;
  }
};

window.refreshAll = function(){
  loadPrices();
  loadManager(document.querySelector('.sidebar-item.active').getAttribute('data-mgr'));
};

function boot(){
  loadPrices();
  // Init sort indicator: Weight ▲ (descending)
  var wth=document.querySelector('.portfolio-table th[data-sort="wt"] .sort-arrow');
  if(wth)wth.textContent='▲';
  var n=0;
  function c(){if(window.Chart){loadManager('salp')}else if(n++<100){setTimeout(c,200)}}
  c();
  setInterval(loadPrices,120000);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
